<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Wonder Woman – Spiegel der Zeit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;800;900&family=Special+Elite&family=Orbitron:wght@600;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — aus der Sounddesign-Präsentation
   Goldenes Lasso #FADC46 · Amazonenblau #1E2864
   Marmor #F0E1C8 · Kriegerin #373737
   ============================================================ */
:root{
  --gold:#FADC46;
  --blue:#1E2864;
  --marble:#F0E1C8;
  --warrior:#373737;

  /* Wertedimensionen */
  --c-courage:#E8443B;   /* Mut      🫀 */
  --c-autonomy:#F77F2A;  /* Freiheit 🔥 */
  --c-strategy:#4A6CF0;  /* Strategie🧠 */
  --c-justice:#F2C53D;   /* Gerecht. ⚖ */
  --c-empathy:#E8589B;   /* Empathie ❤ */

  /* aktive Raum-Theme-Variablen (werden per JS gesetzt) */
  --bg:#070912;
  --bg2:#0d1124;
  --accent:var(--gold);
  --accent2:var(--blue);
  --ink:var(--marble);
  --panel:rgba(255,255,255,.05);
  --panelbd:rgba(255,255,255,.14);
  --headfont:'Bangers', cursive;
  --headspace:1.5px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overflow:hidden;}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  color:var(--ink);
  -webkit-user-select:none;user-select:none;
  touch-action:manipulation;
  transition:background .6s ease, color .6s ease;
}

#app{position:fixed;inset:0;display:flex;flex-direction:column;}

/* ============================================================
   ARMBAND / HEADER — Wertedimensionen füllen sich sichtbar
   ============================================================ */
#topbar{
  flex:0 0 auto;
  display:flex;align-items:center;gap:14px;
  padding:14px 22px;
  background:linear-gradient(to bottom, rgba(0,0,0,.35), rgba(0,0,0,0));
  position:relative;z-index:30;
  transition:opacity .5s;
}
#roomtag{
  font-family:var(--headfont);
  letter-spacing:var(--headspace);
  font-size:clamp(15px,2.6vw,22px);
  color:var(--accent);
  text-transform:uppercase;
  white-space:nowrap;
  text-shadow:0 2px 0 rgba(0,0,0,.4);
}
#roomtag small{
  display:block;font-family:'Inter';font-weight:500;letter-spacing:.5px;
  font-size:11px;color:var(--ink);opacity:.6;text-transform:none;
}
#armband{display:flex;gap:10px;margin-left:auto;align-items:center;}
.val{display:flex;flex-direction:column;align-items:center;gap:3px;width:46px;}
.val .vico{font-size:16px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.5));}
.val .vbar{width:100%;height:5px;border-radius:3px;background:rgba(255,255,255,.13);overflow:hidden;}
.val .vfill{height:100%;width:0;border-radius:3px;transition:width .6s cubic-bezier(.2,.8,.2,1);}
.val.bump{animation:bump .5s ease;}
@keyframes bump{0%{transform:translateY(0)}30%{transform:translateY(-7px) scale(1.12)}100%{transform:translateY(0)}}

#progresswrap{position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(255,255,255,.08);}
#progressbar{height:100%;width:0;background:var(--accent);transition:width .5s ease;}

/* ============================================================
   STAGE / SCREENS
   ============================================================ */
#stage{flex:1 1 auto;position:relative;overflow:hidden;}
.screen{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px clamp(24px,5vw,90px);
  text-align:center;
  opacity:0;transform:translateY(18px) scale(.99);
  pointer-events:none;
  transition:opacity .5s ease, transform .5s ease;
  overflow-y:auto;
}
.screen.show{opacity:1;transform:none;pointer-events:auto;}

/* ROOM TITLE CARD */
.era{font-family:var(--headfont);letter-spacing:3px;font-size:13px;color:var(--accent);opacity:.85;margin-bottom:8px;text-transform:uppercase;}
.roomtitle{
  font-family:var(--headfont);
  letter-spacing:var(--headspace);
  font-size:clamp(40px,9vw,92px);
  line-height:.95;
  color:var(--accent);
  text-transform:uppercase;
  margin:0 0 4px;
  text-shadow:3px 4px 0 rgba(0,0,0,.35);
}
.roomsub{font-size:clamp(16px,3vw,24px);font-weight:600;opacity:.92;margin:6px 0 4px;}
.atmos{font-size:13px;letter-spacing:3px;text-transform:uppercase;opacity:.55;margin-bottom:26px;}
.roomintro{max-width:680px;font-size:clamp(15px,2.4vw,19px);line-height:1.55;opacity:.85;margin-bottom:30px;}

/* QUESTION */
.scene{max-width:640px;font-style:italic;opacity:.7;font-size:15px;line-height:1.5;margin-bottom:16px;}
.qtext{
  max-width:780px;
  font-family:var(--headfont);
  letter-spacing:.5px;
  font-size:clamp(26px,5vw,46px);
  line-height:1.05;
  margin:0 0 30px;
  color:var(--ink);
}
.options{display:flex;flex-direction:column;gap:14px;width:100%;max-width:760px;}
.opt{
  display:flex;align-items:center;gap:16px;
  text-align:left;
  background:var(--panel);
  border:2px solid var(--panelbd);
  color:var(--ink);
  border-radius:18px;
  padding:20px 24px;
  font-size:clamp(16px,2.5vw,21px);
  font-weight:500;line-height:1.3;
  cursor:pointer;
  transition:transform .15s, border-color .25s, background .25s, box-shadow .25s;
}
.opt .letter{
  flex:0 0 auto;
  width:42px;height:42px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--headfont);font-size:22px;
  background:var(--accent);color:#1a1a1a;
}
.opt:active{transform:scale(.98);}
.opt.sel{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 18%, transparent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 30%, transparent);}
.opt.dim{opacity:.4;}
.gain{display:flex;gap:8px;margin-left:auto;opacity:0;transition:opacity .3s;}
.opt.sel .gain{opacity:1;}
.chip{font-size:12px;font-weight:700;padding:5px 10px;border-radius:20px;color:#fff;white-space:nowrap;}

/* BUTTONS */
.btn{
  margin-top:6px;
  font-family:var(--headfont);letter-spacing:2px;
  font-size:clamp(20px,3vw,26px);
  text-transform:uppercase;
  background:var(--accent);color:#171717;
  border:none;border-radius:50px;
  padding:16px 46px;cursor:pointer;
  box-shadow:0 6px 0 rgba(0,0,0,.25);
  transition:transform .12s, box-shadow .12s;
}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.25);}
.btn.ghost{background:transparent;color:var(--accent);border:2px solid var(--accent);box-shadow:none;}

/* SVG-Icon als Button (z. B. Portal „Armband anlegen“) */
.iconbtn{
  background:none;border:none;box-shadow:none;padding:0;margin-top:6px;
  width:clamp(140px,22vw,190px);line-height:0;cursor:pointer;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.4));
  animation:iconpulse 2.6s ease-in-out infinite;
  transition:transform .12s, filter .2s;
}
.iconbtn img{width:100%;height:auto;display:block;pointer-events:none;}
.iconbtn:active{transform:scale(.93);animation:none;}
@keyframes iconpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.iconcta{margin-top:14px;font-family:var(--headfont);letter-spacing:1.5px;text-transform:uppercase;
  font-size:clamp(16px,2.4vw,22px);color:var(--accent);opacity:.95;}

/* ============================================================
   DECOR LAYERS (per theme, behind content)
   ============================================================ */
.decor{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.screen>*{position:relative;z-index:1;}

/* spotlight (prolog/epilog) */
.spot{position:absolute;width:60vmax;height:60vmax;border-radius:50%;
  background:radial-gradient(circle,var(--accent) 0%, transparent 62%);opacity:.16;filter:blur(8px);}
/* concentric rings (portal/werte-zentrum) */
.rings{position:absolute;left:50%;top:50%;width:0;height:0;}
.rings span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);border:1.5px solid var(--accent);border-radius:50%;opacity:.18;}
/* stars (silver) */
.stars{position:absolute;inset:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:tw 3s infinite ease-in-out;}
@keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
/* halftone dots (golden) */
.halftone{position:absolute;inset:0;opacity:.5;
  background-image:radial-gradient(var(--accent2) 1.5px, transparent 1.6px);
  background-size:22px 22px;mix-blend-mode:multiply;}
/* redaction bars (flur) */
.redact{position:absolute;background:#111;height:18px;border-radius:2px;opacity:.85;}
/* diagonal stripes (heute) */
.stripes{position:absolute;inset:-20%;background:repeating-linear-gradient(45deg,transparent 0 38px,color-mix(in srgb,var(--accent) 16%,transparent) 38px 76px);}
/* city skyline (bronze) */
.skyline{position:absolute;left:0;right:0;bottom:0;height:34%;
  background:
    linear-gradient(to top, color-mix(in srgb,var(--accent2) 55%, transparent), transparent);
  -webkit-mask:repeating-linear-gradient(to right,#000 0 30px,transparent 30px 38px,#000 38px 80px,transparent 80px 86px);
  opacity:.4;}

/* pulse line (volume2 lie detector) */
.pulse{position:absolute;left:0;right:0;top:50%;height:120px;opacity:.3;}
.pulse svg{width:100%;height:100%;}
.pulse path{stroke:var(--accent);stroke-width:2;fill:none;
  stroke-dasharray:1400;stroke-dashoffset:1400;animation:draw 4s linear infinite;}
@keyframes draw{to{stroke-dashoffset:0}}

/* ============================================================
   RESULT
   ============================================================ */
#result .archhero{font-family:var(--headfont);font-size:clamp(48px,11vw,120px);line-height:.9;
  color:var(--accent);text-transform:uppercase;margin:4px 0;text-shadow:4px 5px 0 rgba(0,0,0,.3);}
#result .archname{font-size:clamp(20px,4vw,30px);font-weight:800;letter-spacing:1px;margin-bottom:4px;}
#result .archdesc{max-width:560px;font-size:18px;line-height:1.5;opacity:.9;margin:8px 0 22px;}
.figs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:620px;margin-bottom:24px;}
.fig{background:var(--panel);border:1px solid var(--panelbd);border-radius:40px;padding:9px 18px;font-weight:600;font-size:15px;}
.bars{width:100%;max-width:560px;margin-bottom:26px;}
.brow{display:flex;align-items:center;gap:12px;margin:9px 0;}
.brow .blab{flex:0 0 130px;text-align:right;font-size:13px;font-weight:600;opacity:.85;}
.brow .btrack{flex:1;height:14px;border-radius:8px;background:rgba(255,255,255,.1);overflow:hidden;}
.brow .bfill{height:100%;width:0;border-radius:8px;transition:width 1s cubic-bezier(.2,.8,.2,1);}
.brow .bval{flex:0 0 34px;font-size:13px;font-weight:700;text-align:left;}

/* ============================================================
   MENÜ
   ============================================================ */
#menubtn{
  display:none;
  font-family:'Inter';font-weight:700;font-size:13px;letter-spacing:.5px;
  background:var(--panel);border:1.5px solid var(--panelbd);color:var(--ink);
  padding:9px 16px;border-radius:30px;cursor:pointer;margin-right:6px;
  transition:transform .12s, background .25s;
}
#menubtn:active{transform:scale(.95);}
.menuhead{max-width:760px;}
.menugrid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
  gap:16px;width:100%;max-width:940px;margin:22px 0 26px;
}
.tile{
  position:relative;text-align:left;cursor:pointer;color:var(--ink);
  background:var(--panel);border:2px solid var(--panelbd);border-left:6px solid var(--tc);
  border-radius:16px;padding:18px 18px 16px;
  transition:transform .15s, box-shadow .25s, border-color .25s;
}
.tile:active{transform:scale(.98);}
.tile:hover{box-shadow:0 0 0 3px color-mix(in srgb,var(--tc) 28%, transparent);}
.tnum{position:absolute;top:12px;right:16px;font-family:var(--headfont);font-size:28px;color:var(--tc);opacity:.45;}
.tera{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;opacity:.6;margin-bottom:4px;}
.ttitle{font-family:var(--headfont);letter-spacing:1px;font-size:30px;line-height:1;color:var(--tc);}
.tsub{font-size:13px;opacity:.82;margin:4px 0 12px;line-height:1.3;}
.tstatus{display:inline-block;font-size:12px;font-weight:600;padding:4px 11px;border-radius:20px;background:rgba(255,255,255,.09);opacity:.85;}
.tstatus.tdone{background:color-mix(in srgb,var(--tc) 28%, transparent);opacity:1;}
.menuactions{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-bottom:10px;}

.hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;opacity:.4;}
::-webkit-scrollbar{width:0;height:0;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <button id="menubtn">☰ Menü</button>
    <div id="roomtag">Wonder Woman<small>Spiegel der Zeit</small></div>
    <div id="armband"></div>
    <div id="progresswrap"><div id="progressbar"></div></div>
  </div>
  <div id="stage">
    <div class="decor" id="decor"></div>
    <div class="screen" id="screen"></div>
  </div>
</div>

<script>

   WERTEDIMENSIONEN
   ============================================================ */
const DIMS = {

  JUSTICE : {label:'Gerechtigkeit',ico:'⚖', color:'var(--c-justice)'},
  EMPATHY : {label:'Empathie',    ico:'❤', color:'var(--c-empathy)'},
};
const DIMKEYS = Object.keys(DIMS);

/* Helfer für Antwort-Optionen */

   ARCHETYPEN (Final Output)

  AUTONOMY:{title:'THE REBEL',  name:'Autonomy Hero', desc:'Freiheit, Selbstbestimmung und Identität. Du gehst deinen eigenen Weg.', figs:['Greta Thunberg','Serena Williams']},
  STRATEGY:{title:'THE ARCHITECT',name:'Strategy Hero', desc:'Kontrolle, Planung und Systemdenken. Du veränderst die Welt mit Klugheit.', figs:['Angela Merkel','Christine Lagarde','Ngozi Okonjo-Iweala']},
  COURAGE :{title:'THE WARRIOR',name:'Courage Hero', desc:'Mut, Risiko und Handlung. Du gehst voran, wenn es darauf ankommt.', figs:['Emma Watson','Nadya Tolokonnikova']},
};

/* ============================================================
   RÄUME — Reihenfolge der Ausstellung, jeweils mit eigenem Theme
   ============================================================ */
const ROOMS = [
 /* === DEAKTIVIERT — zum Wieder-Aktivieren diese beiden Räume aus dem Kommentar nehmen ===
 {
   id:'prolog', theme:'prolog', era:'Willkommen',
   title:'Prolog', sub:'Die Halle der Helden', atmos:'Epische Atmosphäre',
   intro:'Tritt ein in die Welt von Wonder Woman – einer Ikone, die sich über 80 Jahre immer wieder neu erfunden hat. Du wirst durch die Epochen ihrer Geschichte gehen. In jedem Raum entscheidest du. Am Ende erfährst du, welche Art von Held:in du bist.',
   cta:'Ausstellung betreten', questions:[]
 },
 {
   id:'volume1', theme:'prolog', era:'Volume 01 · 1941',
   title:'Eine Idee', sub:'…nimmt Gestalt an', atmos:'Storytelling durch Audio',
   intro:'Am Schreibtisch von William Moulton Marston entsteht 1941 eine neue Heldin – geboren aus Idealen von Wahrheit, Stärke und Mitgefühl. Bald wird ihr Armband auf deine Entscheidungen reagieren.',
   cta:'Weiter zum Portal', questions:[]
 },
 === ENDE DEAKTIVIERT === */
 {
   id:'portal', theme:'portal', era:'Portal',
   title:'Dein Armband', sub:'Das Wonder-Woman-Armband', atmos:'Geheimnisvolle Schwelle',
   intro:'„Dieses Armband reagiert auf deine Entscheidungen. Jede Antwort formt ein Werteprofil aus fünf Dimensionen. Folge den Szenen und finde heraus, welche Art von Held:in du bist.“',
   cta:'Armband anlegen', iconBtn:'Icon_Auswertungsstation.svg',
   questions:[
     {q:'Bist du bereit, Entscheidungen zu treffen, die dich selbst beschreiben?',
      opts:[
        O('Ja – ich möchte herausfinden, wer ich bin','COURAGE','AUTONOMY'),
        O('Ich möchte zuerst verstehen, wie dieses System funktioniert','STRATEGY','JUSTICE'),
      ]},
   ]
 },
 {
   id:'volume2', theme:'volume2', era:'Volume 02',
   title:'Die Menschen', sub:'…hinter der Figur', atmos:'Geheimnisvolle Atmosphäre',

   cta:'Lügendetektor starten',
   questions:[
     {q:'Was ist wichtiger: Wahrheit oder Schutz?',
      opts:[

        O('Menschen schützen – auch wenn dafür nicht alles gesagt wird','EMPATHY','STRATEGY'),
      ]},
     {q:'Würdest du lügen, wenn du sicher wärst, dass niemand je die Wahrheit erfährt?',
      opts:[ O('Ja','STRATEGY','AUTONOMY'), O('Nein','JUSTICE','COURAGE') ]},

 },
 {
   id:'flur', theme:'flur', era:'Flur',

 {

      ]},
   ]
 },
 {
   id:'comicstore', theme:'golden', era:'Zwischenstation',
   title:'Comic Store', sub:'Look! Read Wonder Woman here!', atmos:'Authentische Erfahrung',
   intro:'Ein Kiosk wie aus den 1940ern – Comics für 10 Cent, Poster und Merch. Atme die Ära ein, bevor du weiterreist.',
   cta:'Weiter ins Silver Age', questions:[]
 },
 {
   id:'silver', theme:'silver', era:'Volume 04 · 1956–1970',
   title:'Silver Age', sub:'Abenteuer in der Unendlichkeit', atmos:'Mystische Weltall-Atmosphäre',
   intro:'Die Handlung verlagert sich ins Kosmische. Du entdeckst ein Portal zu einer völlig unbekannten Welt – Grenzen verschwimmen zwischen Mut, Wissen und Verantwortung.',
   cta:'Ins Unendliche reisen',
   questions:[
     {q:'Ist Gewalt manchmal notwendig?',
      opts:[

/* ============================================================
   THEMES — Variablen + Dekoration je Raum
   ============================================================ */
const THEMES = {
  menu:{vars:{'--bg':'#06070f','--bg2':'#0c0f20','--accent':'var(--gold)','--accent2':'var(--blue)','--ink':'#F0E1C8','--panel':'rgba(250,220,70,.06)','--panelbd':'rgba(250,220,70,.2)','--headfont':"'Bangers',cursive"},
    grad:'radial-gradient(120% 90% at 50% 0%, #1a1f45 0%, #06070f 72%)', decor:'spot'},
  prolog:{vars:{'--bg':'#06070f','--bg2':'#0c0f20','--accent':'var(--gold)','--accent2':'var(--blue)','--ink':'#F0E1C8','--panel':'rgba(250,220,70,.06)','--panelbd':'rgba(250,220,70,.25)','--headfont':"'Bangers',cursive"},
    grad:'radial-gradient(120% 90% at 50% 0%, #15193a 0%, #06070f 70%)', decor:'spot'},
  portal:{vars:{'--bg':'#0a0f33','--bg2':'#070925','--accent':'var(--gold)','--accent2':'#3a4db0','--ink':'#EDE6FF','--panel':'rgba(250,220,70,.07)','--panelbd':'rgba(250,220,70,.3)','--headfont':"'Bangers',cursive"},
    grad:'radial-gradient(90% 90% at 50% 50%, #25307a 0%, #0a0f33 55%, #05061e 100%)', decor:'rings'},
  volume2:{vars:{'--bg':'#08120f','--bg2':'#0a1a16','--accent':'#6FE3B0','--accent2':'#1d4d40','--ink':'#D8F2E8','--panel':'rgba(111,227,176,.06)','--panelbd':'rgba(111,227,176,.22)','--headfont':"'Bangers',cursive"},

  flur:{vars:{'--bg':'#EDE2CC','--bg2':'#e3d6b8','--accent':'#C2362F','--accent2':'#1E2864','--ink':'#2a2620','--panel':'rgba(0,0,0,.04)','--panelbd':'rgba(40,38,30,.25)','--headfont':"'Bangers',cursive"},
    grad:'linear-gradient(180deg,#F2E8D2,#E3D6B8)', decor:'redact'},
  golden:{vars:{'--bg':'#F7D23A','--bg2':'#f0c020','--accent':'#C2362F','--accent2':'#1E2864','--ink':'#241c10','--panel':'rgba(255,255,255,.4)','--panelbd':'rgba(30,40,100,.55)','--headfont':"'Bangers',cursive"},

    grad:'radial-gradient(120% 100% at 50% 0%, #2a1a6a 0%, #150a3a 45%, #060418 100%)', decor:'stars'},
  bronze:{vars:{'--bg':'#1d1018','--bg2':'#2a1622','--accent':'#FF5FA2','--accent2':'#E89B2A','--ink':'#FBE7D6','--panel':'rgba(255,95,162,.08)','--panelbd':'rgba(255,159,90,.3)','--headfont':"'Bangers',cursive"},
    grad:'linear-gradient(180deg,#3a1c2e 0%,#241320 55%,#160c14 100%)', decor:'skyline'},

    grad:'linear-gradient(135deg,#161616,#080808)', decor:'stripes'},

    grad:'radial-gradient(120% 120% at 50% 110%, #FBE16B 0%, #F6EFDD 45%, #FFFFFF 100%)', decor:'spot'},
};

/* ============================================================
   STATE
   ============================================================ */
const state = {room:0, q:0, mode:'menu', answers:{}, scores:Object.fromEntries(DIMKEYS.map(k=>[k,0]))};
const totalQ = ROOMS.reduce((n,r)=>n+r.questions.length,0);

/* SVG-Icon als Start-Button in jedem Raum */
const START_ICON = 'Icon_Auswertungsstation.svg';

/* Akzentfarbe je Raum für die Menü-Kacheln */
const MENUCOLOR = {portal:'#FADC46', volume2:'#6FE3B0', flur:'#D24A42', golden:'#E8A81E', silver:'#4ED8E8', bronze:'#FF5FA2', heute:'#FFE32E'};

const screen = document.getElementById('screen');
const decor  = document.getElementById('decor');
const roomtag= document.getElementById('roomtag');
const armband= document.getElementById('armband');
const progbar= document.getElementById('progressbar');
const menubtn= document.getElementById('menubtn');
menubtn.onclick = goMenu;

/* Armband-Header aufbauen */
DIMKEYS.forEach(k=>{
  const d=DIMS[k];
  const el=document.createElement('div');
  el.className='val'; el.id='val-'+k;
  el.innerHTML=`<div class="vico">${d.ico}</div><div class="vbar"><div class="vfill" style="background:${d.color}"></div></div>`;
  armband.appendChild(el);
});

function applyTheme(themeId){
  const t=THEMES[themeId];
  for(const [k,v] of Object.entries(t.vars)) document.documentElement.style.setProperty(k,v);
  document.body.style.background=t.grad;
  buildDecor(t.decor, themeId);
}

function buildDecor(type,themeId){
  decor.innerHTML='';
  decor.style.background='';
  if(type==='spot'){
    const a=document.createElement('div');a.className='spot';a.style.left='-10%';a.style.top='-20%';
    const b=document.createElement('div');b.className='spot';b.style.right='-10%';b.style.bottom='-25%';b.style.left='auto';
    decor.append(a,b);
  } else if(type==='rings'){
    const w=document.createElement('div');w.className='rings';
    for(let i=1;i<=6;i++){const s=document.createElement('span');const sz=i*16+8;s.style.width=sz+'vmin';s.style.height=sz+'vmin';w.appendChild(s);}
    decor.appendChild(w);
  } else if(type==='stars'){
    const s=document.createElement('div');s.className='stars';
    for(let i=0;i<70;i++){const st=document.createElement('div');st.className='star';const z=Math.random()*2+1;
      st.style.width=z+'px';st.style.height=z+'px';st.style.left=Math.random()*100+'%';st.style.top=Math.random()*100+'%';
      st.style.animationDelay=(Math.random()*3)+'s';s.appendChild(st);}
    decor.appendChild(s);
  } else if(type==='halftone'){
    const h=document.createElement('div');h.className='halftone';decor.appendChild(h);
  } else if(type==='redact'){
    for(let i=0;i<14;i++){const r=document.createElement('div');r.className='redact';
      r.style.left=(5+Math.random()*60)+'%';r.style.top=(Math.random()*100)+'%';r.style.width=(80+Math.random()*240)+'px';
      r.style.opacity=(.12+Math.random()*.3);decor.appendChild(r);}
  } else if(type==='stripes'){
    const s=document.createElement('div');s.className='stripes';decor.appendChild(s);
  } else if(type==='skyline'){
    const s=document.createElement('div');s.className='skyline';decor.appendChild(s);
  } else if(type==='pulse'){
    const p=document.createElement('div');p.className='pulse';
    p.innerHTML='<svg viewBox="0 0 1400 120" preserveAspectRatio="none"><path d="M0,60 L300,60 L330,60 L350,20 L370,100 L390,60 L700,60 L730,60 L750,10 L770,110 L790,60 L1400,60"/></svg>';
    decor.appendChild(p);
  }
}

function updateArmband(bumpKeys){
  const max=Math.max(4,...DIMKEYS.map(k=>state.scores[k]));
  DIMKEYS.forEach(k=>{
    const fill=document.querySelector('#val-'+k+' .vfill');
    fill.style.width=(state.scores[k]/max*100)+'%';
  });
  if(bumpKeys) bumpKeys.forEach(k=>{const el=document.getElementById('val-'+k);el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');});
}

function setRoomTag(r){
  roomtag.innerHTML = r.isResult ? `Auswertung<small>Die HeldInnen von morgen</small>`
    : `${r.title.replace(/<[^>]+>/g,'')}<small>${r.sub}</small>`;
}

function show(html){
  screen.classList.remove('show');
  setTimeout(()=>{ screen.innerHTML=html; screen.scrollTop=0; requestAnimationFrame(()=>screen.classList.add('show')); },260);
}

/* ---------- SCORING (aus gespeicherten Antworten) ---------- */
function recomputeScores(){
  DIMKEYS.forEach(k=>state.scores[k]=0);
  for(const r of ROOMS){
    const ans=state.answers[r.id]; if(!ans) continue;
    ans.forEach((oi,qi)=>{ if(oi==null) return; r.questions[qi].opts[oi].gains.forEach(g=>state.scores[g]++); });
  }
}
function roomAnswered(r){ const a=state.answers[r.id]; return a? a.filter(v=>v!=null).length : 0; }
function answeredCount(){ return ROOMS.reduce((n,r)=>n+roomAnswered(r),0); }

/* ---------- HAUPTMENÜ ---------- */
function goMenu(){ state.mode='menu'; render(); }

function renderMenu(){
  applyTheme('menu');
  menubtn.style.display='none';
  roomtag.innerHTML='Hauptmenü<small>Wonder Woman · Spiegel der Zeit</small>';
  progbar.style.width=(answeredCount()/totalQ*100)+'%';
  const playable=ROOMS.filter(r=>!r.isResult && r.questions.length>0);
  const tiles=playable.map((r,n)=>{
    const done=roomAnswered(r), tot=r.questions.length;
    const complete = tot>0 && done>=tot;
    const status = tot===0 ? 'Zwischenstation'
      : complete ? '✓ Beantwortet'
      : (done>0 ? `${done}/${tot} beantwortet` : `${tot} Fragen`);
    const col=MENUCOLOR[r.theme]||'var(--accent)';
    return `<button class="tile" data-room="${ROOMS.indexOf(r)}" style="--tc:${col}">
        <div class="tnum">${String(n+1).padStart(2,'0')}</div>
        <div class="tera">${r.era}</div>
        <div class="ttitle">${r.title}</div>
        <div class="tsub">${r.sub}</div>
        <div class="tstatus ${complete?'tdone':''}">${status}</div>
      </button>`;
  }).join('');
  const html=`
    <div class="menuhead">
      <div class="era">Klangszenografie</div>
      <h1 class="roomtitle">Wähle einen Raum</h1>
      <p class="roomintro">Jeder Raum stellt dir Fragen. Deine Antworten formen dein Werteprofil – sieh es jederzeit in der Auswertung.</p>
    </div>
    <div class="menugrid">${tiles}</div>
    <div class="menuactions">
      <button class="btn" id="toresult">Auswertung ansehen</button>
      <button class="btn ghost" id="resetall">Zurücksetzen</button>
    </div>`;
  show(html);
  setTimeout(()=>{
    screen.querySelectorAll('.tile').forEach(t=>{
      t.onclick=()=>{ state.room=+t.dataset.room; state.mode='card'; render(); };
    });
    document.getElementById('toresult').onclick=()=>{
      state.room=ROOMS.findIndex(r=>r.isResult); state.mode='card'; render();
    };
    document.getElementById('resetall').onclick=()=>{
      state.answers={}; recomputeScores(); updateArmband(); renderMenu();
    };
  },300);
}

/* ---------- RENDER (Dispatcher) ---------- */
function render(){
  if(state.mode==='menu'){ renderMenu(); return; }
  const r=ROOMS[state.room];
  applyTheme(r.theme);
  setRoomTag(r);
  menubtn.style.display='inline-block';
  progbar.style.width=(answeredCount()/totalQ*100)+'%';

  if(r.isResult){ renderResult(); return; }

  if(state.mode==='card'){
    const html=`
      <div class="era">${r.era}</div>
      <h1 class="roomtitle">${r.title}</h1>
      <div class="roomsub">${r.sub}</div>
      <div class="atmos">${r.atmos}</div>
      <p class="roomintro">${r.intro}</p>
      <button class="iconbtn" id="go" aria-label="${r.cta||'Weiter'}"><img src="${r.iconBtn||START_ICON}" alt="${r.cta||'Weiter'}"></button>
      <div class="iconcta">${r.cta||'Weiter'}</div>`;
    show(html);
    setTimeout(()=>{document.getElementById('go').onclick=()=>{
      if(r.questions.length){state.mode='question';state.q=0;render();}
      else goMenu();
    };},300);
  } else {
    renderQuestion();
  }
}

function renderQuestion(){
  const r=ROOMS[state.room], item=r.questions[state.q];
  const opts=item.opts.map((o,i)=>{
    const chips=o.gains.map(g=>`<span class="chip" style="background:${DIMS[g].color}">${DIMS[g].ico} ${DIMS[g].label}</span>`).join('');
    const letter='ABCDEFG'[i];
    return `<button class="opt" data-i="${i}">
        <span class="letter">${letter}</span>
        <span class="otext">${o.label}</span>
        <span class="gain">${chips}</span>
      </button>`;
  }).join('');
  const html=`
    <div class="era">${r.era} · Frage ${state.q+1}/${r.questions.length}</div>
    ${item.scene?`<div class="scene">${item.scene}</div>`:''}
    <h2 class="qtext">${item.q}</h2>
    <div class="options">${opts}</div>`;
  show(html);
  setTimeout(()=>{
    screen.querySelectorAll('.opt').forEach(btn=>{
      btn.onclick=()=>choose(btn,item);
    });
  },300);
}

function choose(btn,item){
  if(screen.dataset.locked) return;
  screen.dataset.locked='1';
  const r=ROOMS[state.room];
  const i=+btn.dataset.i, gains=item.opts[i].gains;
  if(!state.answers[r.id]) state.answers[r.id]=[];
  state.answers[r.id][state.q]=i;
  recomputeScores();
  screen.querySelectorAll('.opt').forEach(b=>{ if(b!==btn) b.classList.add('dim'); });
  btn.classList.add('sel');
  updateArmband(gains);
  progbar.style.width=(answeredCount()/totalQ*100)+'%';
  setTimeout(()=>{
    screen.dataset.locked='';
    if(state.q+1 < r.questions.length){ state.q++; renderQuestion(); }
    else goMenu();
  },1250);
}

/* ---------- RESULT ---------- */
function renderResult(){
  // höchste Dimension bestimmt Archetyp; Gleichstand → erste in fester Reihenfolge
  const order=['JUSTICE','EMPATHY','AUTONOMY','STRATEGY','COURAGE'];
  let best=order[0];
  order.forEach(k=>{ if(state.scores[k]>state.scores[best]) best=k; });
  const a=ARCH[best], d=DIMS[best];
  const max=Math.max(1,...DIMKEYS.map(k=>state.scores[k]));
  const sorted=[...DIMKEYS].sort((x,y)=>state.scores[y]-state.scores[x]);
  const bars=sorted.map(k=>`
    <div class="brow">
      <div class="blab">${DIMS[k].ico} ${DIMS[k].label}</div>
      <div class="btrack"><div class="bfill" data-w="${state.scores[k]/max*100}" style="background:${DIMS[k].color}"></div></div>
      <div class="bval">${state.scores[k]}</div>
    </div>`).join('');
  const figs=a.figs.map(f=>`<div class="fig">${f}</div>`).join('');
  const html=`
    <div id="result" style="display:flex;flex-direction:column;align-items:center;">
      <div class="era">Dein Werteprofil</div>
      <div style="font-size:54px;margin:2px 0">${d.ico}</div>
      <div class="archhero">${a.title}</div>
      <div class="archname">${a.name}</div>
      <div class="archdesc">${a.desc}</div>
      <div class="bars">${bars}</div>
      <div class="era">Moderne Vergleichsfiguren</div>
      <div class="figs">${figs}</div>
      <div class="menuactions">
        <button class="btn" id="tomenu">Zurück zum Menü</button>
        <button class="btn ghost" id="restart">Alles zurücksetzen</button>
      </div>
    </div>`;
  show(html);
  setTimeout(()=>{
    screen.querySelectorAll('.bfill').forEach(f=>f.style.width=f.dataset.w+'%');
    document.getElementById('tomenu').onclick=goMenu;
    document.getElementById('restart').onclick=()=>{
      state.answers={}; recomputeScores(); updateArmband(); goMenu();
    };
  },340);
}

/* GO */
recomputeScores();
updateArmband();
render();
</script>
